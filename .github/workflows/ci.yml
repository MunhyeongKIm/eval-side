name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eval_side_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/eval_side_test
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GOOGLE_GENERATIVE_AI_API_KEY: test-key
      OPENROUTER_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push
      - name: Type Check
        run: npx tsc --noEmit
      - name: Unit Tests
        run: npx vitest run
      - name: Build
        run: npx next build
